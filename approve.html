<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Approval</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background: #f4f5f7; color: #1a1a2e; padding: 20px; max-width: 760px; margin: 0 auto;
        }
        h1 { font-size: 1.4rem; margin-bottom: 4px; }
        h2 { font-size: 1.05rem; margin: 24px 0 10px; color: #333; }
        .sub { color: #777; font-size: 0.85rem; margin-bottom: 8px; }
        .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .kid-name { font-size: 1.2rem; font-weight: 800; }
        .muted { color: #888; font-size: 0.85rem; }
        input[type=number] { width: 90px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; text-align: right; }
        input[type=text]   { padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; flex: 1; }
        button { background: #2d6cdf; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
        button.secondary { background: #6b7280; }
        button:disabled { opacity: 0.5; cursor: default; }
        .pv-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
        .pv-row span { flex: 1; }
        .approved { color: #1a8f3c; font-weight: 700; font-size: 0.85rem; }
        .balance { font-size: 1.3rem; font-weight: 800; color: #2d6cdf; }
        #gate { text-align: center; padding-top: 60px; }
        #gate input { text-align: center; letter-spacing: 6px; font-size: 1.5rem; width: 160px; }
        .err { color: #c0392b; font-size: 0.85rem; margin-top: 6px; }
        .redeem-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        .chore-edit .row { flex-wrap: wrap; gap: 8px; }
        .day-lbl { font-size: 0.85rem; display: inline-flex; align-items: center; gap: 3px; margin-right: 6px; }
        label { font-size: 0.9rem; }
        .ce-rotate, .ce-days { display: inline-flex; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div id="gate" class="card" style="max-width:280px;margin:60px auto;">
        <h1>Parent PIN</h1>
        <p class="sub">Enter PIN to manage points</p>
        <input id="pin" type="password" inputmode="numeric" autocomplete="off">
        <div style="margin-top:12px;"><button onclick="unlock()">Unlock</button></div>
        <div id="gate-err" class="err"></div>
    </div>

    <div id="app" style="display:none;">
        <h1>Parent Approval</h1>
        <div class="row" style="justify-content:flex-start;gap:12px;">
            <div class="sub" id="week-label"></div>
            <button class="secondary" onclick="refreshData()" style="padding:4px 10px;font-size:0.8rem;">Refresh</button>
        </div>

        <h2>Approve this week</h2>
        <div class="sub">Review each kid's earned points, adjust if needed, then approve to bank them.</div>
        <div id="approvals"></div>

        <h2>Banked balances</h2>
        <div id="balances"></div>

        <h2>Manage chores</h2>
        <div class="sub">Add, edit, or remove chores. Saving updates the board and this page for everyone.</div>
        <div id="chore-editor"></div>
        <div style="margin:10px 0 28px;">
            <button class="secondary" onclick="addChore()">+ Add chore</button>
            <button onclick="saveChores()">Save chores</button>
            <span id="chores-saved" class="approved" style="display:none;">Saved ✓</span>
            <div id="chores-err" class="err"></div>
        </div>
    </div>

    <script>
        var API_URL = "/api/v1";
        var API_TOKEN = "oikos_rUikei0NSSZt-S2zzI5KFPO6cMPADFN8UCYb_VawtJo";
        var KIDS = [
            { id: 2, name: "Evelyn" },
            { id: 3, name: "Amelia" },
            { id: 5, name: "Eli" }
        ];

        var PIN = "";
        var store = null;
        var CONFIG = { chores: [], defaultPoints: 10 };

        function getWeekStart() {
            var now = new Date();
            var day = now.getDay();
            var diff = day === 0 ? -6 : 1 - day;
            var monday = new Date(now);
            monday.setDate(now.getDate() + diff);
            monday.setHours(0, 0, 0, 0);
            return monday;
        }
        function ymd(d) {
            return d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, "0") + "-" +
                String(d.getDate()).padStart(2, "0");
        }
        function pointValue(title) {
            if (store.pointValues && store.pointValues.hasOwnProperty(title)) return store.pointValues[title];
            return store.defaultPoints;
        }

        function unlock() {
            PIN = document.getElementById("pin").value;
            if (!PIN) { document.getElementById("gate-err").textContent = "Enter a PIN"; return; }
            // Verify by attempting a harmless authorized write (re-save current points config).
            loadAll().then(function () {
                return fetch("/store/points", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json", "x-parent-pin": PIN },
                    body: JSON.stringify({ defaultPoints: store.defaultPoints, pointValues: store.pointValues })
                });
            }).then(function (r) {
                if (r.status === 401) { document.getElementById("gate-err").textContent = "Wrong PIN"; return; }
                document.getElementById("gate").style.display = "none";
                document.getElementById("app").style.display = "block";
                render();
                startAutoRefresh();
            }).catch(function () {
                document.getElementById("gate-err").textContent = "Could not reach server";
            });
        }

        function loadAll() {
            return Promise.all([
                fetch("/store").then(function (r) { return r.json(); }),
                fetch("/chores.json").then(function (r) { return r.json(); })
            ]).then(function (res) {
                store = res[0];
                CONFIG = res[1] || { chores: [], defaultPoints: 10 };
            });
        }

        // Re-pull store + config and re-render (used by the Refresh button and
        // whenever the parent switches back to this tab).
        function refreshData() {
            if (!PIN) return;
            loadAll().then(function () { render(); });
        }
        var _autoRefreshOn = false;
        function startAutoRefresh() {
            if (_autoRefreshOn) return;
            _autoRefreshOn = true;
            window.addEventListener("focus", refreshData);
            document.addEventListener("visibilitychange", function () { if (!document.hidden) refreshData(); });
        }

        // A kid's logged completions this week → { count, points }. Same source
        // the board uses, so the numbers line up exactly.
        function kidWeekly(kidId, weekStart) {
            var list = (store.completions || []).filter(function (c) {
                return String(c.kidId) === String(kidId) && new Date(c.at) >= weekStart;
            });
            var pts = list.reduce(function (s, c) { return s + (c.points || 0); }, 0);
            return { count: list.length, points: pts };
        }

        function render() {
            var weekStart = getWeekStart();
            var wkKey = ymd(weekStart);
            document.getElementById("week-label").textContent = "Week starting Monday " + wkKey;

            // --- Approvals ---
            var ap = document.getElementById("approvals");
            ap.innerHTML = "";
            KIDS.forEach(function (kid) {
                var w = kidWeekly(kid.id, weekStart);
                var earned = w.points;
                var prior = (store.approvals || []).find(function (a) {
                    return a.kidId === String(kid.id) && a.weekStart === wkKey;
                });

                var card = document.createElement("div");
                card.className = "card";
                card.innerHTML =
                    '<div class="row">' +
                        '<div><div class="kid-name">' + kid.name + '</div>' +
                            '<div class="muted">' + w.count + ' completions &middot; ' + earned + ' pts earned</div>' +
                            (prior ? '<div class="approved">Approved: ' + prior.points + ' pts</div>' : '') +
                        '</div>' +
                        '<div class="row" style="gap:8px;">' +
                            '<input type="number" id="appr-' + kid.id + '" value="' + (prior ? prior.points : earned) + '">' +
                            '<button onclick="approve(' + kid.id + ',\'' + wkKey + '\')">' +
                                (prior ? 'Update' : 'Approve') + '</button>' +
                        '</div>' +
                    '</div>';
                ap.appendChild(card);
            });

            // --- Balances ---
            var bal = document.getElementById("balances");
            bal.innerHTML = "";
            KIDS.forEach(function (kid) {
                var b = (store.balances && store.balances[String(kid.id)]) || 0;
                var card = document.createElement("div");
                card.className = "card";
                card.innerHTML =
                    '<div class="row">' +
                        '<div class="kid-name">' + kid.name + '</div>' +
                        '<div class="balance">' + b + ' pts</div>' +
                    '</div>' +
                    '<div class="redeem-row">' +
                        '<input type="number" id="rdm-amt-' + kid.id + '" placeholder="amount" min="1">' +
                        '<input type="text" id="rdm-note-' + kid.id + '" placeholder="reward (e.g. screen time)">' +
                        '<button class="secondary" onclick="redeem(' + kid.id + ')">Redeem</button>' +
                    '</div>';
                bal.appendChild(card);
            });

            // --- Manage chores ---
            renderChores();
        }

        function approve(kidId, wkKey) {
            var pts = Number(document.getElementById("appr-" + kidId).value);
            fetch("/store/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-parent-pin": PIN },
                body: JSON.stringify({ kidId: kidId, weekStart: wkKey, points: pts })
            }).then(function (r) { return r.json(); })
              .then(function (s) { store = s; render(); });
        }

        function redeem(kidId) {
            var amt = Number(document.getElementById("rdm-amt-" + kidId).value);
            var note = document.getElementById("rdm-note-" + kidId).value;
            if (!amt || amt <= 0) return;
            fetch("/store/redeem", {
                method: "POST",
                headers: { "Content-Type": "application/json", "x-parent-pin": PIN },
                body: JSON.stringify({ kidId: kidId, amount: amt, note: note })
            }).then(function (r) { return r.json(); })
              .then(function (s) { store = s; render(); });
        }

        // ---- Manage chores editor -------------------------------------------
        function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
        function slugify(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
        var DAY_DEFS = [["sun","S"],["mon","M"],["tue","T"],["wed","W"],["thu","Th"],["fri","F"],["sat","Sa"]];

        function dayBoxes(days){
            var arr = Array.isArray(days) ? days.map(function(d){ return String(d).toLowerCase(); }) : [];
            return DAY_DEFS.map(function(p){
                return '<label class="day-lbl"><input type="checkbox" data-day="'+p[0]+'"'+(arr.indexOf(p[0])>=0?" checked":"")+'>'+p[1]+'</label>';
            }).join("");
        }
        function kidBoxes(rotateList){
            var sel = Array.isArray(rotateList) ? rotateList : [];
            return (CONFIG.kids||[]).map(function(k){
                return '<label class="day-lbl"><input type="checkbox" data-kid="'+esc(k.name)+'"'+(sel.indexOf(k.name)>=0?" checked":"")+'>'+esc(k.name)+'</label>';
            }).join("");
        }
        function choreCard(c){
            c = c || {};
            var isDaily = (!c.days || c.days === "daily");
            var assignVal = c.rotate ? "rotate" : ((!c.who || c.who === "all") ? "all" : "kid:"+c.who);
            var opts = '<option value="all"'+(assignVal==="all"?" selected":"")+'>Everyone</option>'
                     + '<option value="rotate"'+(assignVal==="rotate"?" selected":"")+'>Rotate</option>'
                     + (CONFIG.kids||[]).map(function(k){ var v="kid:"+k.name; return '<option value="'+esc(v)+'"'+(assignVal===v?" selected":"")+'>Just '+esc(k.name)+'</option>'; }).join("");
            var pts = (typeof c.points==="number") ? c.points : (CONFIG.defaultPoints||10);
            return '<div class="card chore-edit" data-id="'+esc(c.id||"")+'">'
                + '<div class="row">'
                +   '<input type="text" class="ce-title" placeholder="Chore name" value="'+esc(c.title||"")+'" style="flex:1;min-width:160px">'
                +   '<input type="number" class="ce-points" min="0" title="points" value="'+pts+'" style="width:74px">'
                +   '<button class="secondary" onclick="this.closest(\'.chore-edit\').remove()">Delete</button>'
                + '</div>'
                + '<div class="row" style="margin-top:8px;">'
                +   '<label>Days: <select class="ce-freq" onchange="toggleDays(this)"><option value="daily"'+(isDaily?" selected":"")+'>Every day</option><option value="some"'+(!isDaily?" selected":"")+'>Specific days</option></select></label>'
                +   '<span class="ce-days" style="'+(isDaily?"display:none;":"")+'">'+dayBoxes(c.days)+'</span>'
                + '</div>'
                + '<div class="row" style="margin-top:8px;">'
                +   '<label>Who: <select class="ce-assign" onchange="toggleRotate(this)">'+opts+'</select></label>'
                +   '<span class="ce-rotate" style="'+(assignVal==="rotate"?"":"display:none;")+'">'+kidBoxes(c.rotate)+' <label class="day-lbl">start <input type="number" class="ce-offset" value="'+(c.offset||0)+'" style="width:46px"></label></span>'
                + '</div>'
                + '</div>';
        }
        function toggleDays(sel){ sel.closest(".chore-edit").querySelector(".ce-days").style.display = sel.value==="some" ? "" : "none"; }
        function toggleRotate(sel){ sel.closest(".chore-edit").querySelector(".ce-rotate").style.display = sel.value==="rotate" ? "" : "none"; }
        function renderChores(){
            var box = document.getElementById("chore-editor");
            if (!box) return;
            box.innerHTML = (CONFIG.chores||[]).map(choreCard).join("");
        }
        function addChore(){
            document.getElementById("chore-editor").insertAdjacentHTML("beforeend", choreCard(null));
        }
        function collectChores(){
            var used = {}, out = [];
            document.querySelectorAll(".chore-edit").forEach(function(div){
                var title = div.querySelector(".ce-title").value.trim();
                if (!title) return;
                var id = div.getAttribute("data-id") || slugify(title) || "chore";
                while (used[id]) id = id.replace(/-\d+$/,"") + "-" + (Math.floor(Math.random()*900)+100);
                used[id] = true;
                var c = { id: id, title: title, points: Number(div.querySelector(".ce-points").value) || (CONFIG.defaultPoints||10) };
                var freq = div.querySelector(".ce-freq").value;
                if (freq === "some") {
                    var ds = [];
                    div.querySelectorAll(".ce-days input[data-day]").forEach(function(cb){ if(cb.checked) ds.push(cb.getAttribute("data-day")); });
                    c.days = ds.length ? ds : "daily";
                } else { c.days = "daily"; }
                var a = div.querySelector(".ce-assign").value;
                if (a === "rotate") {
                    var ks = [];
                    div.querySelectorAll(".ce-rotate input[data-kid]").forEach(function(cb){ if(cb.checked) ks.push(cb.getAttribute("data-kid")); });
                    c.rotate = ks;
                    var off = Number(div.querySelector(".ce-offset").value);
                    if (off) c.offset = off;
                } else if (a.indexOf("kid:") === 0) {
                    c.who = a.slice(4);
                } else {
                    c.who = "all";
                }
                out.push(c);
            });
            return out;
        }
        function saveChores(){
            var errEl = document.getElementById("chores-err");
            errEl.textContent = "";
            var cfg = {
                rotationCadence: CONFIG.rotationCadence || "week",
                rotationEpoch: CONFIG.rotationEpoch || "2026-06-29",
                defaultPoints: CONFIG.defaultPoints || 10,
                kids: CONFIG.kids || [],
                chores: collectChores()
            };
            fetch("/chores", {
                method: "PUT",
                headers: { "Content-Type": "application/json", "x-parent-pin": PIN },
                body: JSON.stringify(cfg)
            }).then(function(r){
                if (r.status === 401) { errEl.textContent = "Wrong PIN — reload and unlock again."; return null; }
                return r.json();
            }).then(function(saved){
                if (!saved) return;
                CONFIG = saved;
                renderChores();
                var t = document.getElementById("chores-saved");
                t.style.display = "inline";
                setTimeout(function(){ t.style.display = "none"; }, 1500);
            }).catch(function(){ errEl.textContent = "Could not save. Check connection."; });
        }

    </script>
</body>
</html>
