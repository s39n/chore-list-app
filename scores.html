<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chore Scores</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        h1 {
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-align: center;
        }

        #last-updated {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 16px;
            text-align: center;
        }

        #scoreboard {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }

        .kid-card {
            background: #16213e;
            border-radius: 20px;
            padding: 20px 18px;
            flex: 1 1 260px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            border-top: 5px solid var(--color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .kid-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }

        .kid-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--color);
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat {
            text-align: right;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Open task — big tap target */
        .task-open {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 16px 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .task-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            flex: 1;
            line-height: 1.2;
        }

        .pts-badge {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--color);
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 2px 7px;
            margin-left: 4px;
            vertical-align: middle;
        }

        .done-btn {
            background: var(--color);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .done-btn:active {
            opacity: 0.7;
        }

        /* Completed task — smaller, muted */
        .task-done {
            padding: 8px 4px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .task-done:last-child { border-bottom: none; }

        .task-done-check {
            color: var(--color);
            font-size: 0.9rem;
        }

        .task-done-title {
            font-size: 0.85rem;
            color: #555;
            text-decoration: line-through;
            flex: 1;
        }

        .undo-btn {
            background: transparent;
            color: #888;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .undo-btn:active { opacity: 0.6; }

        .all-done {
            text-align: center;
            color: var(--color);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 0;
        }

        #error-msg {
            color: #f66;
            text-align: center;
            margin-top: 40px;
            font-size: 1rem;
            display: none;
        }

        @media (orientation: landscape) {
            #scoreboard { flex-direction: row; flex-wrap: nowrap; align-items: flex-start; }
            .kid-card { max-width: none; }
        }

        /* Today's calendar strip */
        #calendar-panel {
            background: #16213e;
            border-radius: 16px;
            border-left: 5px solid #ffcc44;
            padding: 14px 18px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 16px;
        }
        #calendar-panel h2 {
            color: #ffcc44;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .cal-event {
            display: flex;
            gap: 12px;
            align-items: baseline;
            padding: 4px 0;
        }
        .cal-time {
            color: #ffcc44;
            font-weight: 700;
            font-size: 0.95rem;
            min-width: 90px;
            flex-shrink: 0;
        }
        .cal-title { color: #fff; font-size: 1rem; }
        .cal-none { color: #666; font-size: 0.9rem; }

        /* Night blackout — covers everything so a dark room stays dark */
        #night-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Chore Board</h1>
    <div id="last-updated">Loading...</div>
    <div id="calendar-panel"></div>
    <div id="scoreboard"></div>
    <div id="error-msg">Could not load. Will retry...</div>
    <div id="night-overlay"></div>

    <script>
        // --- Old-iPad Safari support: pure XHR, no fetch/Promise needed ---
        // Surface any JS error on screen instead of silently hanging on "Loading".
        window.onerror = function (msg, src, line) {
            var e = document.getElementById("error-msg");
            if (e) { e.style.display = "block"; e.textContent = "JS error: " + msg + " (line " + line + ")"; }
            return false;
        };
        function showError(text) {
            var e = document.getElementById("error-msg");
            if (e) { e.style.display = "block"; e.textContent = text; }
        }
        // Plain XHR (works on every iPad). onOk(parsedJsonOrNull) / onErr(status).
        function xhrJson(method, url, headers, body, onOk, onErr) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open(method, url, true);
                if (headers) {
                    for (var h in headers) {
                        if (headers.hasOwnProperty(h)) xhr.setRequestHeader(h, headers[h]);
                    }
                }
                xhr.onreadystatechange = function () {
                    if (xhr.readyState !== 4) return;
                    if (xhr.status >= 200 && xhr.status < 300) {
                        var parsed = null;
                        try { parsed = xhr.responseText ? JSON.parse(xhr.responseText) : null; } catch (e) { parsed = null; }
                        onOk(parsed);
                    } else {
                        onErr(xhr.status);
                    }
                };
                xhr.send(body || null);
            } catch (e) { onErr(-1); }
        }
        // String.padStart (added iOS 10)
        if (!String.prototype.padStart) {
            String.prototype.padStart = function (targetLength, padString) {
                targetLength = targetLength >> 0;
                padString = String(typeof padString !== "undefined" ? padString : " ");
                var str = String(this);
                if (str.length >= targetLength || !padString.length) return str;
                var pad = "";
                while (pad.length < targetLength - str.length) pad += padString;
                return pad.slice(0, targetLength - str.length) + str;
            };
        }

        var API_URL = "/api/v1";
        var API_TOKEN = "oikos_rUikei0NSSZt-S2zzI5KFPO6cMPADFN8UCYb_VawtJo";

        var KIDS = [
            { id: 2, name: "Evelyn", color: "#ff4444" },
            { id: 3, name: "Amelia", color: "#dd44ff" },
            { id: 5, name: "Eli",    color: "#4488ff" }
        ];

        // Points store (point values + banked balances), refreshed each cycle.
        var STORE = { defaultPoints: 10, pointValues: {}, balances: {} };
        function pointValue(title) {
            if (STORE.pointValues && STORE.pointValues.hasOwnProperty(title)) return STORE.pointValues[title];
            return STORE.defaultPoints;
        }

        function getWeekStart() {
            var now = new Date();
            var day = now.getDay();
            var diff = day === 0 ? -6 : 1 - day;
            var monday = new Date(now);
            monday.setDate(now.getDate() + diff);
            monday.setHours(0, 0, 0, 0);
            return monday;
        }

        function todayStr() {
            var d = new Date();
            return d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, "0") + "-" +
                String(d.getDate()).padStart(2, "0");
        }

        function markDone(id) {
            var btn = document.getElementById("btn-" + id);
            if (btn) { btn.textContent = "..."; btn.disabled = true; }
            xhrJson("PATCH", API_URL + "/tasks/" + id + "/status",
                { "Authorization": "Bearer " + API_TOKEN, "Content-Type": "application/json" },
                JSON.stringify({ status: "done" }),
                function () { loadScores(); },
                function () { if (btn) { btn.textContent = "Done!"; btn.disabled = false; } }
            );
        }

        // Put a chore back to "open" if it was marked done by accident.
        function markUndone(id) {
            var btn = document.getElementById("undo-" + id);
            if (btn) { btn.textContent = "..."; btn.disabled = true; }
            xhrJson("PATCH", API_URL + "/tasks/" + id + "/status",
                { "Authorization": "Bearer " + API_TOKEN, "Content-Type": "application/json" },
                JSON.stringify({ status: "open" }),
                function () { loadScores(); },
                function () { if (btn) { btn.textContent = "Undo"; btn.disabled = false; } }
            );
        }

        // Which kid a task belongs to. Tasks carry assigned_to = null and encode
        // the child's name in the title, e.g. "Unload Dishwasher (Eli)".
        // Prefer an explicit assigned_to id; otherwise match the trailing (Name).
        function kidForTask(t) {
            for (var i = 0; i < KIDS.length; i++) {
                if (KIDS[i].id === t.assigned_to) return KIDS[i];
            }
            var m = /\(([^)]+)\)\s*$/.exec(t.title || "");
            if (m) {
                var name = m[1].trim().toLowerCase();
                for (var j = 0; j < KIDS.length; j++) {
                    if (KIDS[j].name.toLowerCase() === name) return KIDS[j];
                }
            }
            return null;
        }

        // Title with the trailing "(Name)" stripped — the card is already under
        // the child's name, so repeating it is redundant.
        function displayTitle(t) {
            return (t.title || "").replace(/\s*\([^)]*\)\s*$/, "");
        }

        // Renders the board from the tasks payload (and current STORE).
        function render(body) {
                var tasks = (body && body.data) ? body.data : (body || []);
                var weekStart = getWeekStart();
                var today = todayStr();
                var todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);
                document.getElementById("error-msg").style.display = "none";

                // Tag each task with its kid up front (handles assigned_to and
                // the "(Name)" title convention), then group per child.
                tasks.forEach(function(t) { t._kid = kidForTask(t); });

                var board = document.getElementById("scoreboard");
                board.innerHTML = "";

                KIDS.forEach(function(kid) {
                    var mine = tasks.filter(function(t) {
                        return t._kid && t._kid.id === kid.id;
                    });

                    var weeklyDone = mine.filter(function(t) {
                        if (t.status !== "done") return false;
                        return new Date(t.updated_at) >= weekStart;
                    });

                    var weeklyPoints = weeklyDone.reduce(function(s, t) {
                        return s + pointValue(t.title);
                    }, 0);
                    var balance = (STORE.balances && STORE.balances[String(kid.id)]) || 0;

                    // Done "today" = completed since local midnight (timezone-safe,
                    // works for both dated and recurring chores).
                    var todayDone = mine.filter(function(t) {
                        if (t.status !== "done") return false;
                        return t.updated_at && new Date(t.updated_at) >= todayStart;
                    });

                    var todayPoints = todayDone.reduce(function(s, t) {
                        return s + pointValue(t.title);
                    }, 0);

                    var todayOpen = mine.filter(function(t) {
                        if (t.status === "done" || t.status === "archived") return false;
                        if (t.due_date) return t.due_date.startsWith(today);
                        return t.is_recurring;
                    });

                    var card = document.createElement("div");
                    card.className = "kid-card";
                    card.style.setProperty("--color", kid.color);

                    var openHtml = "";
                    todayOpen.forEach(function(t) {
                        openHtml +=
                            '<div class="task-open">' +
                                '<span class="task-title">' + displayTitle(t) +
                                    ' <span class="pts-badge">+' + pointValue(t.title) + '</span></span>' +
                                '<button class="done-btn" id="btn-' + t.id + '" onclick="markDone(' + t.id + ')">Done!</button>' +
                            '</div>';
                    });

                    var doneHtml = "";
                    todayDone.forEach(function(t) {
                        doneHtml +=
                            '<div class="task-done">' +
                                '<span class="task-done-check">✓</span>' +
                                '<span class="task-done-title">' + displayTitle(t) + '</span>' +
                                '<button class="undo-btn" id="undo-' + t.id + '" onclick="markUndone(' + t.id + ')">Undo</button>' +
                            '</div>';
                    });

                    var bodyHtml = openHtml || '<div class="all-done">All done! 🎉</div>';
                    if (doneHtml) bodyHtml += doneHtml;

                    card.innerHTML =
                        '<div class="kid-header">' +
                            '<div class="kid-name">' + kid.name + '</div>' +
                            '<div class="stats">' +
                                '<div class="stat">' +
                                    '<div class="stat-value">' + todayPoints + '</div>' +
                                    '<div class="stat-label">pts today</div>' +
                                '</div>' +
                                '<div class="stat">' +
                                    '<div class="stat-value">' + weeklyPoints + '</div>' +
                                    '<div class="stat-label">pts week</div>' +
                                '</div>' +
                                '<div class="stat">' +
                                    '<div class="stat-value">' + balance + '</div>' +
                                    '<div class="stat-label">bank</div>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                        bodyHtml;

                    board.appendChild(card);
                });

                var now = new Date();
                document.getElementById("last-updated").textContent =
                    "Updated " + now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function loadScores() {
            xhrJson("GET", API_URL + "/tasks",
                { "Authorization": "Bearer " + API_TOKEN, "Content-Type": "application/json" },
                null,
                function (tasksBody) {
                    // Points store is optional — render even if it fails.
                    xhrJson("GET", "/store", null, null,
                        function (storeObj) {
                            if (storeObj) { STORE = storeObj; }
                            document.getElementById("error-msg").style.display = "none";
                            render(tasksBody);
                        },
                        function () {
                            document.getElementById("error-msg").style.display = "none";
                            render(tasksBody);
                        }
                    );
                },
                function (status) {
                    showError("Could not load chores (HTTP " + status + "). Will retry…");
                }
            );
        }

        // --- Today's calendar -------------------------------------------------
        // calendar.json is regenerated each morning from the Family calendar and
        // served by server.js as a static file. Shape: { events: [{ time, title }] }.
        function escHtml(s) {
            return String(s == null ? "" : s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function renderCalendar(data) {
            var panel = document.getElementById("calendar-panel");
            if (!panel) return;
            var evs = (data && data.events) ? data.events : [];
            var html = "<h2>Today</h2>";
            if (!evs.length) {
                html += '<div class="cal-none">Nothing on the calendar today</div>';
            } else {
                for (var i = 0; i < evs.length; i++) {
                    html +=
                        '<div class="cal-event">' +
                            '<span class="cal-time">' + escHtml(evs[i].time) + '</span>' +
                            '<span class="cal-title">' + escHtml(evs[i].title) + '</span>' +
                        '</div>';
                }
            }
            panel.innerHTML = html;
        }
        function loadCalendar() {
            xhrJson("GET", "/calendar.json", null, null,
                function (d) { renderCalendar(d); },
                function () { /* keep last good calendar on a blip */ }
            );
        }

        // --- Night blackout (board awake 6:30am–8:00pm) -----------------------
        var WAKE_MIN = 6 * 60 + 30;   // 6:30 am
        var SLEEP_MIN = 20 * 60;      // 8:00 pm
        function nightCheck() {
            var now = new Date();
            var mins = now.getHours() * 60 + now.getMinutes();
            var awake = mins >= WAKE_MIN && mins < SLEEP_MIN;
            var ov = document.getElementById("night-overlay");
            if (ov) ov.style.display = awake ? "none" : "block";
        }

        document.getElementById("last-updated").textContent = "Loading (v4)…";
        loadScores();
        loadCalendar();
        nightCheck();
        setInterval(loadScores, 60 * 1000);
        setInterval(loadCalendar, 5 * 60 * 1000);
        setInterval(nightCheck, 30 * 1000);
    </script>
</body>
</html>
